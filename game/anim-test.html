<!doctype html>
<html><head><meta charset="utf-8"><style>body{margin:0;background:#111}</style></head>
<body>
<canvas id="c" width="1400" height="700"></canvas>
<script type="module">
import * as THREE from './vendor/three.module.js';
import { characterParts } from './characters.js';

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2030);
scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x223, 2.2));
const sun = new THREE.DirectionalLight(0xffffff, 2.0);
sun.position.set(3, 6, 5);
scene.add(sun);
const camera = new THREE.PerspectiveCamera(40, 2, 0.1, 100);
camera.position.set(6, 1.7, 9.5);
camera.lookAt(6, 1.0, 0);

const names = ['marine', 'crew_armed', 'civilian', 'combat_civ', 'combat_odst', 'infection'];
const clips = { marine: 'walk', crew_armed: 'walk', civilian: 'walk', combat_civ: 'run', combat_odst: 'attack', infection: 'writhe' };
const rigs = [];
names.forEach((n, i) => {
  const grp = new THREE.Group();
  for (const p of characterParts(n)) {
    const mesh = new THREE.Mesh(p.geometry, new THREE.MeshStandardMaterial({
      map: p.texture, roughness: 0.78, metalness: 0.06, side: THREE.DoubleSide }));
    mesh.userData.part = p.part;
    mesh.userData.pivot = p.pivot;
    grp.add(mesh);
  }
  grp.position.set(i * 2.4, 0, 0);
  grp.rotation.y = -0.5; // three-quarter view
  scene.add(grp);
  rigs.push({ grp, clip: clips[n] });
});

const swing = (part, clip, ph) => {
  const s = Math.sin(ph);
  if (clip === 'walk') {
    return part === 'legL' ? s * 0.5 : part === 'legR' ? -s * 0.5
      : part === 'armL' ? -s * 0.3 : part === 'armR' ? s * 0.3 : 0;
  }
  if (clip === 'run') {
    return part === 'legL' ? s * 0.85 : part === 'legR' ? -s * 0.85
      : part === 'armL' ? -s * 0.6 : part === 'armR' ? s * 0.6 : 0;
  }
  if (clip === 'attack') {
    return part === 'armL' ? -1.0 + Math.sin(ph * 1.7) * 0.55
      : part === 'armR' ? -1.0 + Math.sin(ph * 1.7 + 2.1) * 0.55
      : part === 'legL' ? s * 0.25 : part === 'legR' ? -s * 0.25 : 0;
  }
  if (clip === 'writhe') {
    return part === 'legL' ? s * 0.35 : part === 'legR' ? -s * 0.35
      : part === 'head' ? Math.sin(ph * 1.3) * 0.25 : 0;
  }
  return 0;
};

let t = 0.65; // mid-stride phase
const pose = () => {
  for (const { grp, clip } of rigs) {
    for (const mesh of grp.children) {
      const p = mesh.userData.pivot;
      if (!p) continue;
      const a = swing(mesh.userData.part, clip, t * 7.2);
      mesh.position.set(0, 0, 0); mesh.rotation.set(0, 0, 0);
      // T(p) R T(-p): rotate the limb about its joint
      mesh.position.set(
        p[0] - (Math.cos(a) * p[0] - Math.sin(a) * p[1]),
        p[1] - (Math.sin(a) * p[0] + Math.cos(a) * p[1]),
        0);
      mesh.rotation.z = a;
    }
  }
  renderer.render(scene, camera);
};
pose();
window.__stepPose = (dt) => { t += dt; pose(); };
window.__ready = true;
</script></body></html>
